{% extends "base.html" %}

{% block content %}
  <h1>Delete task?</h1>
  <form action="" method="post">
    {% csrf_token %}

    <input type="submit" value="Yes" class="btn btn-danger">
    {% url 'task:task-list' as task_list_url %}
    <a class="btn btn-secondary" href="{{ request.GET.next|default:task_list_url }}">Cancel</a>
  </form>
{% endblock %}
